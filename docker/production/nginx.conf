# nginx.conf — production reverse proxy + TLS termination for the payroll stack.
#
# Routes:
#   /api, /assets, /files, /private, /socket.io  -> Frappe (backend)
#   everything else                              -> Next.js frontend
#
# TLS is terminated here; Frappe and the frontend speak plain HTTP on the internal
# Docker network only. Replace server_name + cert paths, then obtain certs with the
# certbot service (see production/README.md §TLS).

upstream frappe_backend { server frappe:8000; }
upstream next_frontend  { server frontend:3000; }

# --- HTTP: ACME challenge + redirect everything else to HTTPS ---
server {
    listen 80;
    server_name payroll.example.gov.iq;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    http2 on;
    server_name payroll.example.gov.iq;

    ssl_certificate     /etc/letsencrypt/live/payroll.example.gov.iq/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/payroll.example.gov.iq/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers. HSTS forces HTTPS; combined with Frappe's secure-cookie
    # config this keeps the session id (sid) cookie off any plaintext channel.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Payroll reports/exports can be large.
    client_max_body_size 50m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Backend (Frappe) — same-origin, so no CORS is needed (the frontend proxies
    # /api through this host; cookies are first-party).
    location ~ ^/(api|assets|files|private|socket\.io|app|method) {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://frappe_backend;
    }

    # Frontend (Next.js).
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://next_frontend;
    }
}
